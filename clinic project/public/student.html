<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NPC Canteen — Order Food</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#d62828;--red-dark:#a11d1d;--red-glow:rgba(214,40,40,0.2);
  --gold:#f77f00;--green:#2d6a4f;--green-light:#d8f3dc;
  --bg:#f5f0eb;--surface:#ffffff;--surface2:#faf7f4;
  --border:#e8e0d8;--border2:#d1c9c0;
  --text:#1c1917;--dim:#6b7280;--muted:#9ca3af;
  --shadow:0 4px 20px rgba(0,0,0,0.06);
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── NAV ── */
.nav{
  height:var(--nav-h);background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:200;
  box-shadow:0 1px 12px rgba(0,0,0,0.05);
}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:var(--text);}
.nav-logo{
  width:36px;height:36px;background:var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 12px var(--red-glow);
}
.nav-right{display:flex;align-items:center;gap:10px;}
.user-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px 6px 8px;
  font-size:13px;font-weight:500;
}
.avatar{
  width:28px;height:28px;background:var(--red);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-email{font-size:11px;color:var(--dim);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-out{
  padding:8px 14px;background:none;border:1px solid var(--border2);
  border-radius:8px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;
}
.btn-out:hover{border-color:var(--red);color:var(--red);}

/* ── TABS ── */
.tabs{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;gap:4px;overflow-x:auto;
}
.tab{
  padding:14px 20px;background:none;border:none;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  color:var(--dim);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all 0.2s;position:relative;
}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab:hover:not(.active){color:var(--text);}
.tab-badge{
  position:absolute;top:8px;right:4px;
  background:var(--red);color:#fff;
  border-radius:10px;font-size:10px;padding:1px 5px;font-weight:700;
  display:none;
}
.tab-badge.show{display:inline-block;}

/* ── PAGE ── */
.page{display:none;padding:24px;}
.page.active{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── LAYOUT: ORDER ── */
.order-layout{
  display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;
  max-width:1300px;
}
@media(max-width:900px){
  .order-layout{grid-template-columns:1fr;}
  .cart-panel{position:fixed!important;bottom:0;left:0;right:0;
    border-radius:20px 20px 0 0;z-index:150;
    max-height:50vh;overflow-y:auto;
    box-shadow:0 -8px 32px rgba(0,0,0,0.15);
    padding-bottom:env(safe-area-inset-bottom,12px);
  }
  .cart-fab{display:flex!important;}
  .page{padding-bottom:80px;}
}

/* ── MENU GRID ── */
.section-title{
  font-family:'DM Serif Display',serif;font-size:22px;
  color:var(--text);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.section-title span{font-size:13px;font-weight:500;color:var(--dim);font-family:'DM Sans',sans-serif;}
.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:14px;
}
@media(max-width:480px){.menu-grid{grid-template-columns:repeat(2,1fr);gap:10px;}}

.menu-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:18px;
  padding:20px 14px 16px;
  cursor:pointer;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
  position:relative;overflow:hidden;text-align:center;
}
.menu-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,var(--red-glow),transparent 70%);
  opacity:0;transition:opacity 0.3s;border-radius:inherit;
}
.menu-card:hover:not(.sold-out){
  border-color:rgba(214,40,40,0.4);
  transform:translateY(-4px);
  box-shadow:0 12px 28px rgba(214,40,40,0.12);
}
.menu-card:hover::after{opacity:1;}
.menu-card:active:not(.sold-out){transform:scale(0.97);}
.menu-card.sold-out{opacity:0.45;cursor:not-allowed;}
.food-icon{font-size:36px;display:block;margin-bottom:10px;line-height:1;}
.food-name{font-weight:600;font-size:14px;line-height:1.3;margin-bottom:6px;}
.food-price{color:var(--red);font-weight:700;font-size:16px;}
.stock-pill{
  position:absolute;top:10px;right:10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;font-size:11px;font-weight:700;
  padding:2px 7px;color:var(--dim);
}
.stock-pill.low{background:#fef3cd;border-color:#fcd34d;color:#92400e;}
.stock-pill.ok{background:#d8f3dc;border-color:#95d5b2;color:var(--green);}
.sold-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.6);border-radius:inherit;
}
.sold-tag{
  background:var(--red);color:#fff;font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:5px;letter-spacing:1px;
  transform:rotate(-8deg);
}

/* ── CART PANEL ── */
.cart-panel{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:18px;padding:20px;
  position:sticky;top:calc(var(--nav-h) + 60px + 16px);
  box-shadow:var(--shadow);
}
.cart-title{
  font-weight:700;font-size:15px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.cart-count{
  background:var(--red);color:#fff;
  border-radius:10px;font-size:11px;font-weight:700;
  padding:2px 8px;
}
.cart-empty{
  text-align:center;padding:30px 0;color:var(--muted);font-size:13px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.cart-empty-icon{font-size:36px;opacity:0.4;}
.cart-items{max-height:280px;overflow-y:auto;margin-bottom:12px;}
.cart-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
  animation:slideRight 0.2s ease;
}
@keyframes slideRight{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
.cart-row:last-child{border-bottom:none;}
.ci{flex-grow:1;}
.ci-name{font-size:13px;font-weight:600;}
.ci-price{font-size:11px;color:var(--dim);}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qbtn{
  width:26px;height:26px;border-radius:8px;
  border:1.5px solid var(--border2);background:#fff;
  font-weight:700;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;color:var(--text);
}
.qbtn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.qnum{font-weight:700;font-size:14px;min-width:20px;text-align:center;}
.cart-total{
  display:flex;justify-content:space-between;
  padding:12px 0;border-top:1.5px solid var(--border2);
  font-weight:700;font-size:18px;margin-bottom:12px;
}
.cart-total span:last-child{color:var(--red);}
.btn-order{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  color:#fff;border:none;border-radius:14px;
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;
  box-shadow:0 4px 14px var(--red-glow);
}
.btn-order:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(214,40,40,0.3);}
.btn-order:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* ── FAB (mobile cart toggle) ── */
.cart-fab{
  display:none;
  position:fixed;bottom:20px;right:20px;z-index:160;
  width:60px;height:60px;border-radius:50%;
  background:var(--red);color:#fff;border:none;
  font-size:24px;cursor:pointer;
  box-shadow:0 4px 20px rgba(214,40,40,0.4);
  align-items:center;justify-content:center;
  animation:popIn 0.3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes popIn{from{transform:scale(0.5);}to{transform:scale(1);}}
.fab-badge{
  position:absolute;top:-2px;right:-2px;
  background:#fff;color:var(--red);
  border-radius:10px;font-size:11px;font-weight:800;
  min-width:20px;height:20px;
  display:none;align-items:center;justify-content:center;
  border:2px solid var(--red);
}
.fab-badge.show{display:flex;}

/* ── HISTORY TABLE ── */
.hist-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:20px;
  box-shadow:var(--shadow);max-width:1000px;
}
.hist-table-wrap{overflow-x:auto;margin-top:16px;}
.hist-table{width:100%;border-collapse:collapse;font-size:13px;}
.hist-table th{
  text-align:left;padding:10px 16px;
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);font-weight:600;border-bottom:2px solid var(--border);
}
.hist-table td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:top;}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr:hover td{background:var(--surface2);}
.ord-badge{
  display:inline-block;
  background:rgba(214,40,40,0.08);border:1px solid rgba(214,40,40,0.2);
  color:var(--red);border-radius:6px;padding:2px 8px;
  font-weight:700;font-size:12px;
}
.status-served{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--green-light);border:1px solid #95d5b2;
  color:var(--green);border-radius:20px;
  padding:3px 10px;font-size:11px;font-weight:700;
}
.status-pending{
  display:inline-flex;align-items:center;gap:4px;
  background:#fff7ed;border:1px solid #fed7aa;
  color:#c2410c;border-radius:20px;
  padding:3px 10px;font-size:11px;font-weight:700;
}
.items-list{display:flex;flex-direction:column;gap:3px;}
.items-row{font-size:12px;color:var(--dim);}
.items-row strong{color:var(--text);}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--dim);}
.empty-icon{font-size:52px;opacity:0.3;margin-bottom:12px;}

/* ── QR MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal-box{
  background:#fff;border-radius:28px;
  padding:40px 36px;text-align:center;
  max-width:380px;width:100%;
  transform:scale(0.85) translateY(20px);
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  position:relative;overflow:hidden;
}
.modal-bg.show .modal-box{transform:scale(1) translateY(0);}
.modal-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--red),var(--gold));
}
.modal-num{
  font-family:'DM Serif Display',serif;font-size:56px;
  color:var(--red);line-height:1;margin:8px 0;
}
.modal-qr{
  background:#f8f4f0;border-radius:16px;padding:16px;
  display:inline-block;margin:16px 0;
}
.modal-qr img{width:180px;height:180px;display:block;border-radius:4px;}
.modal-sub{color:var(--dim);font-size:13px;margin-bottom:20px;line-height:1.5;}
.btn-close{
  padding:12px 28px;
  background:var(--surface2);border:1.5px solid var(--border2);
  color:var(--text);border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;
}
.btn-close:hover{background:#f0ece8;}

/* ── TOAST ── */
.toasts{position:fixed;top:74px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;font-size:13px;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.1);
  display:flex;align-items:center;gap:10px;min-width:220px;
  animation:toastIn 0.3s cubic-bezier(0.16,1,0.3,1);
  pointer-events:all;
}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.toast.s{border-left:3px solid #16a34a;}
.toast.e{border-left:3px solid var(--red);}
.toast.i{border-left:3px solid var(--gold);}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">🏫</div>
    <div>
      <div>NPC Canteen</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="user-chip">
      <div class="avatar" id="navAvatar">?</div>
      <div>
        <div id="navName" style="font-weight:600;font-size:13px;">Loading...</div>
        <div class="user-email" id="navEmail"></div>
      </div>
    </div>
    <button class="btn-out" onclick="logout()">Sign Out</button>
  </div>
</nav>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-tab="order" onclick="switchTab('order')">🛒 Order Food</button>
  <button class="tab" data-tab="history" onclick="switchTab('history')">
    📋 My Orders <span class="tab-badge" id="pendingBadge"></span>
  </button>
</div>

<!-- PAGE: ORDER -->
<div class="page active" id="page-order">
  <div class="order-layout">
    <!-- Menu -->
    <div>
      <div class="section-title">Today's Menu <span id="menuSubtitle"></span></div>
      <div class="menu-grid" id="menuGrid">
        <div class="empty"><div class="empty-icon">🍽️</div><p>Loading menu...</p></div>
      </div>
    </div>
    <!-- Cart -->
    <div class="cart-panel" id="cartPanel">
      <div class="cart-title">
        Your Tray <span class="cart-count" id="cartCount" style="display:none">0</span>
      </div>
      <div class="cart-items" id="cartItems">
        <div class="cart-empty"><div class="cart-empty-icon">🧺</div>Tap a food item to add it</div>
      </div>
      <div class="cart-total"><span>Total</span><span>₱<span id="cartTotal">0.00</span></span></div>
      <button class="btn-order" id="btnOrder" onclick="placeOrder()" disabled>Generate QR & Order →</button>
    </div>
  </div>
</div>

<!-- PAGE: HISTORY -->
<div class="page" id="page-history">
  <div class="hist-card">
    <div class="section-title">My Orders</div>
    <div id="histContent"><div class="empty"><div class="empty-icon">🧾</div><p>No orders yet.</p></div></div>
  </div>
</div>

<!-- FAB (mobile) -->
<button class="cart-fab" id="cartFab" onclick="toggleMobileCart()">
  🛒
  <div class="fab-badge" id="fabBadge">0</div>
</button>

<!-- QR MODAL -->
<div class="modal-bg" id="qrModal">
  <div class="modal-box">
    <p style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);">Order Confirmed! 🎉</p>
    <div class="modal-num" id="qrNum">#0000</div>
    <div class="modal-qr"><img id="qrImg" src="" alt="QR"/></div>
    <p class="modal-sub">Show this QR code at the counter<br/>when your order is ready.</p>
    <button class="btn-close" onclick="closeModal()">Done — Back to Menu</button>
  </div>
</div>

<!-- TOASTS -->
<div class="toasts" id="toasts"></div>

<script>
let currentUser = null;
let menuItems = [];
let cart = {}; // { menuItemId: { ...item, qty } }
let cartOpen = false;

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  const res = await fetch('/api/auth/me');
  const { user } = await res.json();
  if (!user) { window.location.href = '/'; return; }
  if (user.role === 'admin') { window.location.href = '/admin'; return; }
  currentUser = user;
  document.getElementById('navName').textContent = user.name;
  document.getElementById('navEmail').textContent = user.email;
  document.getElementById('navAvatar').textContent = user.name[0].toUpperCase();
  await loadMenu();
  await loadHistory();
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/';
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + id));
  if (id === 'history') loadHistory();
}

// ── MENU ──────────────────────────────────────────────────────
async function loadMenu() {
  const res = await fetch('/api/menu');
  menuItems = await res.json();
  renderMenu();
}

function renderMenu() {
  const grid = document.getElementById('menuGrid');
  const sub = document.getElementById('menuSubtitle');
  sub.textContent = menuItems.length ? `${menuItems.length} items available` : '';
  if (!menuItems.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🍽️</div><p>No food available yet. Check back soon!</p></div>';
    return;
  }
  grid.innerHTML = menuItems.map(item => {
    const cartQty = cart[item.id]?.qty || 0;
    const remaining = item.stock - cartQty;
    const soldOut = remaining <= 0;
    const stockClass = remaining <= 3 ? 'low' : 'ok';
    return `
      <div class="menu-card ${soldOut ? 'sold-out' : ''}" onclick="${soldOut ? '' : `addToCart(${item.id})`}">
        <div class="stock-pill ${soldOut ? '' : stockClass}">${remaining}</div>
        <span class="food-icon">${item.emoji}</span>
        <div class="food-name">${item.name}</div>
        <div class="food-price">₱${parseFloat(item.price).toFixed(2)}</div>
        ${soldOut ? '<div class="sold-overlay"><div class="sold-tag">SOLD OUT</div></div>' : ''}
      </div>
    `;
  }).join('');
}

function addToCart(id) {
  const item = menuItems.find(i => i.id === id);
  if (!item) return;
  const cartQty = cart[id]?.qty || 0;
  const remaining = item.stock - cartQty;
  if (remaining <= 0) { toast('e', 'No more stock!'); return; }
  if (!cart[id]) cart[id] = { ...item, qty: 1 };
  else cart[id].qty++;
  renderMenu();
  renderCart();
  toast('s', `${item.emoji} ${item.name} added!`);
}

function changeQty(id, delta) {
  const item = menuItems.find(i => i.id == id);
  if (!cart[id]) return;
  const newQty = cart[id].qty + delta;
  if (newQty <= 0) { delete cart[id]; }
  else if (item && newQty > item.stock) { toast('e', 'Not enough stock!'); return; }
  else cart[id].qty = newQty;
  renderMenu();
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cartItems');
  const totalEl = document.getElementById('cartTotal');
  const btn = document.getElementById('btnOrder');
  const count = document.getElementById('cartCount');
  const fabBadge = document.getElementById('fabBadge');
  const fab = document.getElementById('cartFab');

  const keys = Object.keys(cart);
  const totalQty = keys.reduce((s, id) => s + cart[id].qty, 0);
  const totalAmt = keys.reduce((s, id) => s + cart[id].price * cart[id].qty, 0);

  // Update badges
  if (totalQty > 0) {
    count.textContent = totalQty; count.style.display = 'inline-block';
    fabBadge.textContent = totalQty; fabBadge.classList.add('show');
    fab.style.display = 'flex';
  } else {
    count.style.display = 'none';
    fabBadge.classList.remove('show');
    fab.style.display = window.innerWidth <= 900 ? 'none' : 'none';
  }

  if (!keys.length) {
    el.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🧺</div>Tap a food item to add it</div>';
    totalEl.textContent = '0.00'; btn.disabled = true; return;
  }

  el.innerHTML = keys.map(id => {
    const item = cart[id];
    return `
      <div class="cart-row">
        <div class="ci">
          <div class="ci-name">${item.emoji} ${item.name}</div>
          <div class="ci-price">₱${parseFloat(item.price).toFixed(2)} each</div>
        </div>
        <div class="qty-ctrl">
          <button class="qbtn" onclick="changeQty(${id},-1)">−</button>
          <span class="qnum">${item.qty}</span>
          <button class="qbtn" onclick="changeQty(${id},1)">+</button>
        </div>
      </div>
    `;
  }).join('');
  totalEl.textContent = totalAmt.toFixed(2);
  btn.disabled = false;
}

// ── ORDER ─────────────────────────────────────────────────────
async function placeOrder() {
  if (!Object.keys(cart).length) return;
  const items = Object.entries(cart).map(([menuItemId, item]) => ({ menuItemId: parseInt(menuItemId), quantity: item.qty }));
  const btn = document.getElementById('btnOrder');
  btn.disabled = true; btn.textContent = 'Placing order...';

  try {
    const res = await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items })
    });
    const data = await res.json();
    if (!res.ok) { toast('e', data.error || 'Order failed'); btn.disabled=false; btn.textContent='Generate QR & Order →'; return; }

    // Show QR
    document.getElementById('qrNum').textContent = '#' + data.order.order_code.split('-').pop();
    document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.order.order_code)}`;
    document.getElementById('qrModal').classList.add('show');

    cart = {};
    await loadMenu();
    renderCart();
    toast('s', `Order placed successfully!`);
    // Update pending badge
    updatePendingBadge();
  } catch(e) {
    toast('e', 'Connection error');
  }
  btn.disabled = false; btn.textContent = 'Generate QR & Order →';
}

function closeModal() {
  document.getElementById('qrModal').classList.remove('show');
}

// ── HISTORY ───────────────────────────────────────────────────
async function loadHistory() {
  const res = await fetch('/api/orders');
  const orders = await res.json();

  const pending = orders.filter(o => o.status === 'pending').length;
  const badge = document.getElementById('pendingBadge');
  if (pending > 0) { badge.textContent = pending; badge.classList.add('show'); }
  else { badge.classList.remove('show'); }

  const el = document.getElementById('histContent');
  if (!orders.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🧾</div><p>You haven\'t placed any orders yet.</p></div>';
    return;
  }
  el.innerHTML = `
    <div class="hist-table-wrap">
      <table class="hist-table">
        <thead><tr>
          <th>Order Code</th>
          <th>Items</th>
          <th>Total</th>
          <th>Date & Time</th>
          <th>Status</th>
        </tr></thead>
        <tbody>
          ${orders.map(o => {
            const d = new Date(o.created_at);
            const dateStr = d.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})
              + ' ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            const items = (o.items||[]).map(i => `<div class="items-row"><strong>${i.quantity}×</strong> ${i.menu_item_emoji} ${i.menu_item_name}</div>`).join('');
            const badge = o.status === 'served'
              ? '<span class="status-served">✓ Served</span>'
              : '<span class="status-pending">⏳ Pending</span>';
            return `<tr>
              <td><span class="ord-badge">${o.order_code}</span></td>
              <td><div class="items-list">${items}</div></td>
              <td style="font-weight:700;color:var(--red)">₱${parseFloat(o.total).toFixed(2)}</td>
              <td style="color:var(--dim);font-size:12px">${dateStr}</td>
              <td>${badge}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function updatePendingBadge() {
  const res = await fetch('/api/orders');
  const orders = await res.json();
  const pending = orders.filter(o => o.status === 'pending').length;
  const badge = document.getElementById('pendingBadge');
  if (pending > 0) { badge.textContent = pending; badge.classList.add('show'); }
  else badge.classList.remove('show');
}

// ── MOBILE CART ───────────────────────────────────────────────
function toggleMobileCart() {
  const panel = document.getElementById('cartPanel');
  cartOpen = !cartOpen;
  panel.style.display = cartOpen ? 'block' : '';
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(type, msg) {
  const icons = {s:'✓',e:'✕',i:'ℹ'};
  const tc = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span> ${msg}`;
  tc.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2800);
}

init();
</script>
</body>
